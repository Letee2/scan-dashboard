<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scan Evolution Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>

@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

:root {
  --bg-primary: #0b0f19;
  --bg-secondary: #111827;
  --bg-card: #151c2c;
  --bg-card-hover: #1a2236;
  --border: #1e293b;
  --border-accent: #2d3a52;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-dim: #64748b;
  --accent-cyan: #06b6d4;
  --accent-blue: #3b82f6;
  --accent-green: #10b981;
  --accent-amber: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #8b5cf6;
  --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

#app { max-width: 1200px; margin: 0 auto; padding: 24px 32px 48px; }

/* Header */
.dash-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}

.dash-header-left { display:flex; align-items:center; gap:14px; }

.dash-header-icon {
  width:36px; height:36px;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}

.dash-header-icon svg { width:20px; height:20px; fill:#fff; }

.dash-header h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.dash-header .subtitle {
  font-size: 12px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  margin-top: 1px;
}

.dash-header-right {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  text-align: right;
}

/* KPI row */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.kpi {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  transition: border-color .2s;
}

.kpi:hover { border-color: var(--border-accent); }

.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.kpi-value {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 600;
  color: var(--text-primary);
}

.kpi-delta {
  font-family: var(--font-mono);
  font-size: 12px;
  margin-top: 4px;
}

.delta-up { color: var(--accent-green); }
.delta-down { color: var(--accent-red); }
.delta-neutral { color: var(--text-dim); }

/* Chart containers */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}

.chart-card.full { grid-column: 1 / -1; }

.chart-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.chart-title .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.chart-canvas-wrap { position: relative; height: 260px; }
.chart-canvas-wrap.tall { height: 320px; }

/* Scan history table */
.section-heading {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin: 28px 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.scan-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  font-family: var(--font-mono);
}

.scan-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}

.scan-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}

.scan-table tr:hover td { background: var(--bg-card-hover); }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}

.badge-ok { background: rgba(16,185,129,.12); color: var(--accent-green); }
.badge-warn { background: rgba(245,158,11,.12); color: var(--accent-amber); }
.badge-fail { background: rgba(239,68,68,.12); color: var(--accent-red); }

/* Proto tags */
.proto-tag-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }

.proto-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-dim);
}

.empty-state h2 {
  font-size: 18px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

/* Responsive */
@media (max-width: 768px) {
  #app { padding: 16px; }
  .chart-grid { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
  .dash-header { flex-direction: column; align-items: flex-start; gap: 12px; }
}

</style>
</head>

(function() {
  'use strict';

  // ── Config ──
  const COLORS = {
    cyan: '#06b6d4', blue: '#3b82f6', green: '#10b981',
    amber: '#f59e0b', red: '#ef4444', purple: '#8b5cf6',
    gray: '#64748b',
  };

  Chart.defaults.color = '#94a3b8';
  Chart.defaults.borderColor = '#1e293b';
  Chart.defaults.font.family = "'IBM Plex Mono', monospace";
  Chart.defaults.font.size = 11;
  Chart.defaults.plugins.legend.labels.boxWidth = 12;
  Chart.defaults.plugins.legend.labels.padding = 16;

  // ── Helpers ──
  const fmt = n => {
    if (n == null) return '--';
    if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
    return n.toLocaleString('en-US');
  };

  const delta = (cur, prev) => {
    if (!prev || prev === 0) return { text: '', cls: 'delta-neutral' };
    const d = ((cur - prev) / prev * 100).toFixed(1);
    const sign = d > 0 ? '+' : '';
    const cls = d > 0 ? 'delta-up' : d < 0 ? 'delta-down' : 'delta-neutral';
    return { text: `${sign}${d}% vs prev`, cls };
  };

  const statusBadge = s => {
    const map = { completed: 'badge-ok', timeout: 'badge-warn', stale: 'badge-warn' };
    return `<span class="badge ${map[s] || 'badge-fail'}">${(s||'?').toUpperCase()}</span>`;
  };

  const parseLabel = id => {
    if (!id || id.length < 8) return id;
    return id.slice(4,6) + '/' + id.slice(6,8);
  };

  // ── Data ──
  const data = RAW.filter(d => d.scan_mode === 'prod').sort((a,b) => a.run_id.localeCompare(b.run_id));
  const app = document.getElementById('app');

  if (data.length === 0) {
    app.innerHTML = `<div class="empty-state">
      <h2>No production scan data yet</h2>
      <p>The dashboard populates automatically after each daily scan.</p>
      ${CONFIG.public ? '' : `<p style="margin-top:12px;font-size:12px;font-family:var(--font-mono)">
        Data file: /var/log/scanner/scan_history.jsonl
      </p>`}
    </div>`;

  const lt = latest.totals || {};

  // ── Render ──

        <div class="dash-header-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </div>
        <div>
          <h1>Scan Evolution</h1>
          <div class="subtitle">Production scan metrics over time</div>
        </div>
      </div>
      <div class="dash-header-right">
        Last scan: ${d.run_id}<br>

      </div>
    </div>`;

      { label: 'FPX rate', value: (lt.fpx_rate||0).toFixed(1) + '%', d: delta(lt.fpx_rate, pt.fpx_rate) },
      { label: 'Nmap success', value: (lt.nmap_rate||0).toFixed(1) + '%', d: delta(lt.nmap_rate, pt.nmap_rate) },
      { label: 'Extraction quality', value: quality > 0 ? quality.toFixed(2) : '--', d: qualityDelta },
      { label: 'Rescue yield', value: ry.toFixed(1) + '%', d: { text: '2nd+3rd attempts', cls: ryClass } },
      { label: 'Dominant error', value: dominantErr.label, d: { text: dominantErr.pct + '% of fails', cls: 'delta-neutral' } },
      { label: 'Clusters', value: lt.clusters || 0, d: delta(lt.clusters, pt.clusters) },
    ];

    // KPIs internos: dimensionado de flota + diagnóstico de corte (andamiaje
    // PR #19). Nunca se muestran en el dashboard público.
    if (!CONFIG.public) {
      kpis.push(
        { label: 'Fleet nodes', value: lt.fleet_total || 0, d: delta(lt.fleet_total, pt.fleet_total) },
        { label: 'Fleet failures', value: lt.fleet_failed || 0, d: { text: '', cls: lt.fleet_failed > 0 ? 'delta-down' : 'delta-neutral' } },
        { label: 'In-flight at cutoff', value: fmt(lt.in_flight_at_cutoff), d: { text: lt.pipeline_drained_all === false ? 'pipeline NOT drained' : (lt.pipeline_drained_all === true ? 'pipeline drained' : 'queue residue'), cls: lt.pipeline_drained_all === false ? 'delta-down' : 'delta-neutral' } },
        { label: 'Producers dead', value: lt.producers_dead || 0, d: { text: 'crashed/incomplete/missing', cls: (lt.producers_dead||0) > 0 ? 'delta-down' : 'delta-neutral' } },
      );
    }

    return `<div class="kpi-row">${kpis.map(k => `
      <div class="kpi">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value">${k.value}</div>
        <div class="kpi-delta ${k.d.cls}">${k.d.text}</div>
      </div>`).join('')}</div>`;
  }

  // Weighted average of avg_score by records — used as the headline
  // quality KPI. Returns 0 when no completeness data is present.
  function avgQuality(completeness) {
    const entries = Object.values(completeness);
    if (!entries.length) return 0;
    let totalRec = 0, weighted = 0;
    entries.forEach(e => {
      const n = e.records || 0;
      totalRec += n;
      weighted += (e.avg_score || 0) * n;
    });
    return totalRec > 0 ? weighted / totalRec : 0;
  }

  function qualityColor(score) {
    if (score >= 0.8) return COLORS.green;
    if (score >= 0.5) return COLORS.amber;
    return COLORS.red;
  }

  function topErrorCategory(breakdown) {
    const total = Object.values(breakdown).reduce((a, b) => a + (b || 0), 0);
    if (!total) return { label: '--', pct: '0.0' };
    const sorted = Object.entries(breakdown).sort((a, b) => b[1] - a[1]);
    const [cat, count] = sorted[0];
    return { label: cat, pct: (count / total * 100).toFixed(1) };
  }

  // CUTOFF-DIAG (andamiaje, PR #19).
  // Tabla de mortalidad de la flota del último run, por cluster (= protocolo):
  // responde "cuántos producers/consumers no completaron y de qué grupo", más el
  // residuo de cola y si el pipeline drenó.
  function renderMortalitySection(latest) {
    if (CONFIG.public) return '';
    const clusters = (latest.clusters || []).filter(c =>
      (c.mortality && Object.keys(c.mortality).length) || c.queue_residue);
    if (!clusters.length) return '';

    const cell = (m, dead) => {
      const exp = (m.expected != null) ? m.expected : '?';
      const done = m.completed || 0;
      const color = dead > 0 ? COLORS.red
        : (m.expected != null && done < m.expected ? COLORS.amber : COLORS.green);
      return `<span style="color:${color}">${done}/${exp}</span>` +
        (dead > 0 ? ` <span style="color:${COLORS.red}">(-${dead})</span>` : '');
    };

    const rows = clusters.map(c => {
      const m = c.mortality || {};
      const p = m.producer || {}, co = m.consumer || {};
      const pDead = (p.crashed||0) + (p.incomplete||0) + (p.missing||0);
      const cDead = (co.crashed||0) + (co.missing||0);
      const res = c.queue_residue || {};
      const inflight = res.total_in_flight || 0;
      const drained = c.pipeline_drained;
      const drainedBadge = drained === true ? '<span class="badge badge-ok">drained</span>'
        : (drained === false ? '<span class="badge badge-warn">not drained</span>' : '--');
      return `<tr>
        <td>${c.name}</td>
        <td>${cell(p, pDead)}</td>
        <td>${cell(co, cDead)}</td>
        <td style="color:${inflight>0?COLORS.amber:'var(--text-dim)'}">${fmt(inflight)}</td>
        <td>${drainedBadge}</td>
      </tr>`;
    }).join('');

    return `<div class="section-heading">Fleet mortality &amp; cutoff residue (latest)</div>
      <table class="scan-table">
        <thead><tr>
          <th>Group</th><th>Producers (done/exp)</th><th>Consumers (done/exp)</th>
          <th>In-flight</th><th>Pipeline</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // Ledger por-productor del último run (interno). Responde de un vistazo,
  // por cluster y shard: cuánto volumen entregó cada productor y si cerró de
  // forma natural (completed), a media (cut) o si nunca arrancó (missing =
  // esperados por tfvars menos los que dejaron registro). Datos verídicos: el
  // volumen sale del propio contador de masscan, la identidad del shard.
  function renderProducerLedgerSection(latest) {
    if (CONFIG.public) return '';
    const clusters = latest.clusters || [];
    if (!clusters.some(c => (c.producer_ledger || []).length)) return '';

    // Guard de veracidad: el ledger (por shard) es fiable; la mortalidad (por
    // hostname) puede envenenarse si se rompe la identidad de telemetría. Si el
    // ledger da producers completados que la mortalidad no ve, avisamos.
    const suspect = clusters.filter(c => {
      const led = c.producer_ledger || [];
      const completed = led.filter(r => r.outcome === 'completed').length;
      const seen = (c.mortality && c.mortality.producer && c.mortality.producer.seen) || 0;
      return completed > 0 && seen < completed;
    }).map(c => c.name);
    const banner = suspect.length ? `<div style="margin:8px 0;padding:10px 12px;border-left:3px solid ${COLORS.red};background:rgba(239,68,68,.08);color:${COLORS.red};font-size:12px">
      ⚠️ Identidad de telemetría sospechosa en: ${suspect.join(', ')}. El ledger dio producers completados que la mortalidad no ve — las cifras de <b>mortalidad NO son fiables</b> (revisar hostname / --network host). El volumen del ledger de abajo sí es fiable.</div>` : '';

    const rows = [];
    clusters.forEach(c => {
      const led = c.producer_ledger || [];
      if (!led.length && !(c.mortality && c.mortality.producer)) return;
      const exp = (c.mortality && c.mortality.producer && c.mortality.producer.expected != null)
        ? c.mortality.producer.expected : null;
      const completed = led.filter(r => r.outcome === 'completed').length;
      const cut = led.filter(r => r.outcome === 'cut').length;
      const missing = (exp != null) ? Math.max(0, exp - led.length) : null;
      const vol = led.reduce((a, r) => a + (r.discovered || 0), 0);

      const tally = `${completed}✓`
        + (cut ? ` · ${cut}✂` : '')
        + (missing ? ` · <span style="color:${COLORS.red}">${missing}∅</span>` : '')
        + (exp != null ? ` / ${exp}` : '');
      rows.push(`<tr style="background:var(--bg-secondary)">
        <td><b>${c.name}</b></td><td></td>
        <td><b>${fmt(vol)}</b></td><td></td><td>${tally}</td></tr>`);

      led.forEach(r => {
        const badge = r.outcome === 'completed'
          ? '<span class="badge badge-ok">completed</span>'
          : '<span class="badge badge-warn">cut</span>';
        const secs = r.masscan_secs ? (r.masscan_secs / 3600).toFixed(1) + 'h' : '--';
        rows.push(`<tr>
          <td style="color:var(--text-dim)">&nbsp;</td>
          <td>${r.shard || '?'}</td>
          <td>${fmt(r.discovered || 0)}</td>
          <td>${secs}</td>
          <td>${badge}</td></tr>`);
      });
      if (missing) {
        rows.push(`<tr><td></td><td colspan="4" style="color:${COLORS.red}">${missing} shard(s) sin arrancar (missing)</td></tr>`);
      }
    });

    return `<div class="section-heading">Producers por shard (latest run)</div>
      ${banner}
      <table class="scan-table">
        <thead><tr>
          <th>Cluster</th><th>Shard</th><th>Volumen (masscan)</th><th>Masscan</th><th>Resultado</th>
        </tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>`;
  }

  // Stacked line of avg_score per protocol over time. We pick the
  // top-N protocols by latest record count to keep the legend readable.
  function buildQualityChart(data) {
    const labels = data.map(d => parseLabel(d.run_id));
    const lastCompleteness = (data[data.length - 1] || {}).completeness || {};
    const ranked = Object.entries(lastCompleteness)
      .sort((a, b) => (b[1].records || 0) - (a[1].records || 0))
      .slice(0, 6)
      .map(([p]) => p);

    if (ranked.length === 0) {
      const ctx = document.getElementById('chartQuality').getContext('2d');
      ctx.fillStyle = '#64748b';
      ctx.font = '12px monospace';
      ctx.fillText('No completeness data yet — enable schema profiler', 16, 32);
      return;
    }

    const palette = [COLORS.cyan, COLORS.green, COLORS.amber, COLORS.purple, COLORS.red, COLORS.blue];
    const datasets = ranked.map((proto, i) => ({
      label: proto,
      data: data.map(d => {
        const entry = ((d.completeness || {})[proto]);
        return entry ? entry.avg_score : null;
      }),
      borderColor: palette[i % palette.length],
      backgroundColor: palette[i % palette.length] + '22',
      tension: 0.3, pointRadius: 2, borderWidth: 1.5,
      spanGaps: true,
    }));

    new Chart(document.getElementById('chartQuality'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: { legend: { position: 'bottom' } },
        scales: {
          y: { min: 0, max: 1, grid: { color: '#1e293b' },
               ticks: { callback: v => v.toFixed(1) } },
          x: { grid: { display: false } },
        },
      },
    });
  }

  // Table with the current per-protocol quality breakdown — same
  // semaphore as the email so operators recognise it instantly.
  function renderQualitySection(latest) {
    const completeness = latest.completeness || {};
    const protos = Object.entries(completeness)
      .sort((a, b) => (b[1].records || 0) - (a[1].records || 0));
    if (!protos.length) return '';

    const rows = protos.map(([proto, s]) => {
      const score = s.avg_score || 0;
      const color = qualityColor(score);
      const skel = s.skeleton_pct || 0;
      const comp = s.complete_pct || 0;
      const partial = Math.max(0, 100 - skel - comp);
      const worst = worstCritical(s);
      const worstText = worst
        ? `${worst.field.split('.').pop()} ${worst.pct.toFixed(0)}%`
        : '—';
      return `<tr>
        <td>${proto}</td>
        <td>${fmt(s.records)}</td>
        <td style="color:${color};font-weight:700">${score.toFixed(2)}</td>
        <td>
          <div style="display:flex;height:10px;border-radius:3px;overflow:hidden;background:var(--bg-card)">
            <div style="width:${skel}%;background:${COLORS.red}"></div>
            <div style="width:${partial}%;background:${COLORS.amber}"></div>
            <div style="width:${comp}%;background:${COLORS.green}"></div>
          </div>
          <div style="font-size:10px;color:var(--text-dim);margin-top:2px">
            skel ${skel.toFixed(0)}% · partial ${partial.toFixed(0)}% · complete ${comp.toFixed(0)}%
          </div>
        </td>
        <td style="font-size:11px;color:var(--text-dim)">worst critical: ${worstText}</td>
      </tr>`;
    }).join('');

    return `<div class="section-heading">Extraction quality per protocol (latest)</div>
      <table class="scan-table">
        <thead><tr>
          <th>Protocol</th><th>Records</th><th>Score</th>
          <th>Distribution</th><th>Notes</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function worstCritical(summary) {
    const rows = ((summary.fill_rates || {}).critical) || [];
    if (!rows.length) return null;
    return rows.reduce((a, b) => (a.pct <= b.pct ? a : b));
  }

  function renderScanTable(data) {
    const reversed = [...data].reverse();
    // El estado de corte del pipeline (stale/timeout) es ruido de diagnóstico
    // interno; se oculta en el dashboard público (andamiaje PR #19).
    const showStatus = !CONFIG.public;
    const rows = reversed.map(d => {
      const t = d.totals || {};
      const clusterList = (d.clusters || []).map(c => c.name).join(', ');
      return `<tr>
        <td>${d.run_id}</td>
        ${showStatus ? `<td>${statusBadge(d.status)}</td>` : ''}
        <td>${(d.duration_hours||0).toFixed(1)}h</td>
        <td>${fmt(t.fpx_identified)}</td>
        <td>${(t.fpx_rate||0).toFixed(0)}%</td>
        <td>${(t.nmap_rate||0).toFixed(0)}%</td>
        <td>${t.clusters || 0}</td>
        <td style="color:var(--text-dim);font-size:11px">${clusterList || '--'}</td>
      </tr>`;
    }).join('');

    return `<div class="section-heading">Scan history</div>
    <table class="scan-table">
      <thead><tr>
        <th>Run ID</th>${showStatus ? '<th>Status</th>' : ''}<th>Duration</th>
        <th>Identified</th><th>FPX%</th><th>Nmap%</th>
        <th>Clusters</th><th>Groups</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

})();

</script>
</body>
</html>
